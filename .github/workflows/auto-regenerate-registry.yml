name: Auto-Regenerate Registry

on:
  push:
    branches:
      - main
    paths:
      - "src/components/**"
      - "src/blocks/**"
      - "scripts/generate-registry.mjs"

concurrency:
  group: auto-regenerate-registry
  cancel-in-progress: true

jobs:
  regenerate:
    name: Regenerate registry.json
    runs-on: ubuntu-latest
    # Skip if this commit was already made by the bot to avoid infinite loops
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Use full history so git can push back
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate registry.json
        run: node scripts/generate-registry.mjs

      - name: Check for changes
        id: diff
        run: |
          if git diff --exit-code registry.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated registry
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry.json
          git commit -m "chore(registry): auto-regenerate registry.json"
          git push
