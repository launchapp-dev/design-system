name: Publish VS Code Extension

on:
  push:
    tags:
      - 'vscode-extension-v*'
  workflow_dispatch:
    inputs:
      pre_release:
        description: 'Publish as pre-release'
        required: false
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    name: Publish VS Code Extension

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install root dependencies
        run: npm install

      - name: Install extension dependencies
        working-directory: packages/vscode-extension
        run: npm install

      - name: Build extension
        working-directory: packages/vscode-extension
        run: npm run build

      - name: Package extension
        working-directory: packages/vscode-extension
        run: npm run package

      - name: Publish to VS Code Marketplace
        working-directory: packages/vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ "${{ github.event.inputs.pre_release }}" = "true" ]; then
            npm run publish:pre
          else
            npm run publish
          fi

      - name: Upload extension as artifact
        uses: actions/upload-artifact@v3
        with:
          name: vscode-design-system-vsix
          path: packages/vscode-extension/*.vsix

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/vscode-extension-v')
        uses: softprops/action-gh-release@v1
        with:
          files: packages/vscode-extension/*.vsix
          prerelease: ${{ github.event.inputs.pre_release == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
