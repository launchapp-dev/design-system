name: Chromatic

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      force:
        description: 'Force rebuild (ignore skip)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Chromatic on PRs
        if: github.event_name == 'pull_request'
        uses: chromaui/action@v11
        with:
          projectToken: ${{ env.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true
          autoAcceptChanges: "main"
          onlyChanged: true
          traceChanged: true
          storybookBaseDir: .
          buildScriptName: "build:storybook"
          skip: ${{ github.event.inputs.force != 'true' && 'Skipped by author' || '' }}
        env:
          CHROMATIC_PULL_REQUEST: ${{ github.event.pull_request.number }}
          CHROMATIC_BRANCH_NAME: ${{ github.head_ref }}
          CHROMATIC_BASE_BRANCH: ${{ github.base_ref }}

      - name: Run Chromatic on main branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: chromaui/action@v11
        with:
          projectToken: ${{ env.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true
          autoAcceptChanges: "main"
          traceChanged: true
          storybookBaseDir: .
          buildScriptName: "build:storybook"
        env:
          CHROMATIC_BRANCH_NAME: main

      - name: Run Chromatic manually
        if: github.event_name == 'workflow_dispatch'
        uses: chromaui/action@v11
        with:
          projectToken: ${{ env.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true
          autoAcceptChanges: "main"
          traceChanged: true
          storybookBaseDir: .
          buildScriptName: "build:storybook"
          forceRebuild: true
